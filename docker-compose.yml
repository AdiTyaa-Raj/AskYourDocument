services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: askyourdocument-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: askyourdocument
      POSTGRES_USER: askyourdocument
      POSTGRES_PASSWORD: askyourdocument
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askyourdocument -d askyourdocument"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
